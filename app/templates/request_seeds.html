<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Need for Seeds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/request_services.css') }}">
</head>
<body>
    <div class="app-container">
        <div class="scroll-content" style="padding-bottom: 40px;">
            
            <!-- Header -->
            <div class="request-for-seeds-header">
                <a href="{{ url_for('views.home') }}" class="close-btn">
                    <img src="{{ url_for('static', filename='icons/x.svg') }}" alt="Close">
                </a>
                <h1>Need for Seeds</h1>
            </div>

            <!-- Search Container -->
            <div class="search-container">
                <div class="search-icon-container">
                    <img src="{{ url_for('static', filename='icons/search.svg') }}" alt="Search" class="search-icon">
                </div>
                <div class="search-text-container">
                    <input type="text" class="search-input" placeholder="Search for seeds...">
                </div>
            </div>

            <!-- Seeds Grid -->
            <div class="seeds-grid">
                <!-- Pechay -->
                <div class="seed-card">
                    <div class="seed-image-container">
                        <img src="{{ url_for('static', filename='images/seeds/pechay.jpg') }}" alt="Pechay" class="seed-image">
                    </div>
                    <div class="seed-info">
                        <div class="seed-name">Pechay</div>
                        <div class="seed-availability">Available: 20 Bags</div>
                    </div>
                </div>

                <!-- Eggplant -->
                <div class="seed-card">
                    <div class="seed-image-container">
                        <img src="{{ url_for('static', filename='images/seeds/eggplant.jpg') }}" alt="Eggplant" class="seed-image">
                    </div>
                    <div class="seed-info">
                        <div class="seed-name">Eggplant</div>
                        <div class="seed-availability">Available: 20 Bags</div>
                    </div>
                </div>

                <!-- Ampalaya -->
                <div class="seed-card">
                    <div class="seed-image-container">
                        <img src="{{ url_for('static', filename='images/seeds/ampalaya.jpg') }}" alt="Ampalaya" class="seed-image">
                    </div>
                    <div class="seed-info">
                        <div class="seed-name">Ampalaya</div>
                        <div class="seed-availability">Available: 20 Bags</div>
                    </div>
                </div>

                <!-- Saluyot -->
                <div class="seed-card">
                    <div class="seed-image-container">
                        <img src="{{ url_for('static', filename='images/seeds/saluyot.jpg') }}" alt="Saluyot" class="seed-image">
                    </div>
                    <div class="seed-info">
                        <div class="seed-name">Saluyot</div>
                        <div class="seed-availability">Available: 20 Bags</div>
                    </div>
                </div>

                <!-- Okra -->
                <div class="seed-card">
                    <div class="seed-image-container">
                        <img src="{{ url_for('static', filename='images/seeds/okra.jpg') }}" alt="Okra" class="seed-image">
                    </div>
                    <div class="seed-info">
                        <div class="seed-name">Okra</div>
                        <div class="seed-availability">Available: 20 Bags</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
