<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tree Seedlings Inventory</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fonts.css') }}">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/request_services.css') }}">
</head>
<body>
    <div class="app-container">
        <div class="scroll-content" style="padding-bottom: 40px;">
            
            <!-- Header -->
            <div class="request-for-seedlings-header">
                <a href="{{ url_for('views.about_ecoservice_seedlings') }}" class="close-btn">
                    <img src="{{ url_for('static', filename='icons/x.svg') }}" alt="Close">
                </a>
                <h1>Tree Seedlings Inventory</h1>
            </div>

            <!-- Search Container -->
            <div class="search-container">
                <div class="search-icon-container">
                    <img src="{{ url_for('static', filename='icons/search.svg') }}" alt="Search" class="search-icon">
                </div>
                <div class="search-text-container">
                    <input type="text" class="search-input" placeholder="Search for plants...">
                </div>
            </div>

            <!-- Seedlings Grid -->
            <div class="seedlings-grid">
                <!-- Narra -->
                <div class="seedlings-card">
                    <div class="seedlings-image-container">
                        <img src="{{ url_for('static', filename='images/Narra.png') }}" alt="Narra" class="seedlings-image">
                    </div>
                    <div class="seedlings-info">
                        <div class="seedlings-name">Narra</div>
                        <div class="seedlings-availability">Available: 20 Pots</div>
                    </div>
                </div>

                <!-- Acacia -->
                <div class="seedlings-card">
                    <div class="seedlings-image-container">
                        <img src="{{ url_for('static', filename='images/Acacia.png') }}" alt="Acacia" class="seedlings-image">
                    </div>
                    <div class="seedlings-info">
                        <div class="seedlings-name">Acacia</div>
                        <div class="seedlings-availability">Available: 20 Pots</div>
                    </div>
                </div>

                <!-- Molave -->
                <div class="seedlings-card">
                    <div class="seedlings-image-container">
                        <img src="{{ url_for('static', filename='images/Molave.png') }}" alt="Molave" class="seedlings-image">
                    </div>
                    <div class="seedlings-info">
                        <div class="seedlings-name">Molave</div>
                        <div class="seedlings-availability">Available: 20 Pots</div>
                    </div>
                </div>

                <!-- Kamagong -->
                <div class="seedlings-card">
                    <div class="seedlings-image-container">
                        <img src="{{ url_for('static', filename='images/Kamagong.png') }}" alt="Kamagong" class="seedlings-image">
                    </div>
                    <div class="seedlings-info">
                        <div class="seedlings-name">Kamagong</div>
                        <div class="seedlings-availability">Available: 20 Pots</div>
                    </div>
                </div>

                <!-- Ilang-ilang -->
                <a href="{{ url_for('views.seedlings_view') }}" class="seedlings-card" style="text-decoration: none;">
                    <div class="seedlings-image-container">
                        <img src="{{ url_for('static', filename='images/Ilang-ilang.png') }}" alt="Ilang-ilang" class="seedlings-image">
                    </div>
                    <div class="seedlings-info">
                        <div class="seedlings-name">Ilang-ilang</div>
                        <div class="seedlings-availability">Available: 20 Pots</div>
                    </div>
                </a>

                <!-- Guyabano -->
                <div class="seedlings-card">
                    <div class="seedlings-image-container">
                        <img src="{{ url_for('static', filename='images/Guyabano.png') }}" alt="Guyabano" class="seedlings-image">
                    </div>
                    <div class="seedlings-info">
                        <div class="seedlings-name">Guyabano</div>
                        <div class="seedlings-availability">Available: 20 Pots</div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
