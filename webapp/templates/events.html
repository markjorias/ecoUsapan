<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Events</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fonts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/events.css') }}">
</head>
<body>
    <div class="app-container">
        <div class="scroll-content" style="padding-bottom: 40px;">
            
            <!-- Header -->
            <div class="events-header">
                <a href="{{ url_for('views.home') }}" class="back-btn">
                    <img src="{{ url_for('static', filename='icons/chevron-left.svg') }}" alt="Back">
                </a>
                <h1 class="header-title">Events</h1>
                <button class="filter-btn">
                    <img src="{{ url_for('static', filename='icons/list.svg') }}" alt="Filter">
                </button>
            </div>

            <!-- Search and Add Event Row -->
            <div class="search-add-row">
                <div class="search-container">
                    <div class="search-icon-container">
                        <img src="{{ url_for('static', filename='icons/search.svg') }}" alt="Search" class="search-icon">
                    </div>
                    <div class="search-text-container">
                        <input type="text" class="search-input" placeholder="Search for events...">
                    </div>
                </div>
                <a href="{{ url_for('views.launch_initiative1') }}" class="add-event-link">
                    <div class="add-event-container">
                        <img src="{{ url_for('static', filename='icons/plus.svg') }}" alt="Add Event" class="add-event-icon">
                    </div>
                </a>
            </div>

            <!-- Event Cards -->
            <div class="events-list">
                <div class="event-card">
                    <div class="event-logo-placeholder"></div>
                    <div class="event-info">
                        <div class="event-org">Organization</div>
                        <div class="event-title">Event Title</div>
                        <div class="event-loc">Location</div>
                    </div>
                    <div class="event-action">  
                        participate
                    </div>
                </div>

                <div class="event-card-2">
                    <div class="event-logo-placeholder"></div>
                    <div class="event-info">
                        <div class="event-org">Organization</div>
                        <div class="event-title">Event Title</div>
                        <div class="event-loc">Location</div>
                    </div>
                    <div class="event-action">
                        participate
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
