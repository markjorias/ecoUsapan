<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Launch Your Initiative - Part 2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fonts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/launch_initiative.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/page-transition.css') }}">
    <script src="{{ url_for('static', filename='js/page-transition.js') }}" defer></script>
</head>
<body>
    <div class="app-container">
        <div class="scroll-content" style="padding-bottom: 40px;"><div class="launch-header">
                <a href="{{ url_for('views.launch_initiative1') }}" class="close-btn">
                    <img src="{{ url_for('static', filename='icons/chevron-left.svg') }}" alt="Back">
                </a>
                <h1>Launch Your Initiative</h1>
            </div>

            <div class="launch-form-container">
                <!-- Organizing Team -->
                <div class="form-group">
                    <label class="form-label">Organizing Team</label>
                    <input type="text" class="form-input mb-12" placeholder="Name of Organization">
                    <div class="chips-container">
                        <div class="chip">LGU</div>
                        <div class="chip">School</div>
                        <div class="chip">NGO</div>
                        <div class="chip">Community<br>Group</div>
                        <div class="chip">Others</div>
                    </div>
                </div>
                
                <!-- Contact Person -->
                <div class="form-group">
                    <label class="form-label">Contact Person</label>
                    <div class="flex-row gap-12">
                        <input type="text" class="form-input" placeholder="First Name">
                        <input type="text" class="form-input" placeholder="Last Name">
                    </div>
                    <input type="text" class="form-input" placeholder="Role">
                    <input type="email" class="form-input" placeholder="Email Address">
                </div>

                <!-- Event Source Link -->
                <div class="form-group">
                    <label class="form-label">Event Source Link</label>
                    <input type="text" class="form-input" placeholder="http://www.eventsourcelink.com/">
                </div>

                <!-- Event Image Upload -->
                <div class="form-group">
                    <label class="form-label">Event Image</label>
                    <div class="upload-container">
                        <input type="file" id="event-image-upload" class="file-input" accept="image/*" hidden>
                        <div class="upload-box" onclick="document.getElementById('event-image-upload').click()">
                            <img src="{{ url_for('static', filename='icons/plus.svg') }}" alt="Upload" class="upload-icon">
                            <span class="upload-text">Upload Image</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="bottom-action-container">
                <button class="next-btn" style="background-color: #49A427;">SUBMIT</button>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const teamChips = document.querySelectorAll('.chip');
            
            teamChips.forEach(chip => {
                chip.addEventListener('click', function() {
                    // Remove active class from all chips
                    teamChips.forEach(c => c.classList.remove('active'));
                    // Add active class to clicked chip
                    this.classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
